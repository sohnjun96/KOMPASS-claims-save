<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>K-SCAN</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --card: #ffffff;
      --line: #e2e8f0;
      --accent: #0f346e;
      --accent-2: #fcb034;
      --bg: #f8fafc;
      --blue: #dbeafe;
      --green: #dcfce7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans KR", "Apple SD Gothic Neo", ui-sans-serif, system-ui, sans-serif;
      background:
        radial-gradient(900px 420px at -10% -10%, #e2e8f0 0%, rgba(226,232,240,0) 70%),
        radial-gradient(900px 420px at 110% -10%, #fde68a 0%, rgba(253,230,138,0) 70%),
        var(--bg);
      color: var(--ink);
    }

    .page {
      padding: 18px;
      max-width: 920px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .logo {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .logoSvg { width: 30px; height: 30px; }

    .title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0 14px;
    }

    .topbar-search {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
    }

    .topbar-search input {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 6px 10px;
      width: 220px;
      font-size: 12px;
      background: #f8fafc;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      transition: transform 0.08s ease, box-shadow 0.2s ease;
    }

    button:active { transform: translateY(1px); }

    #copyLatest {
      background: linear-gradient(135deg, var(--accent) 0%, #143a7a 60%, #1d4ed8 100%);
      color: #ffffff;
      box-shadow: 0 10px 18px rgba(15, 52, 110, 0.25);
    }

    #extractSelected,
    #copySelectedAppNos {
      background: #ffffff;
      border: 1px solid var(--line);
      color: #0f172a;
    }

    #clear {
      background: #ffffff;
      border: 1px solid var(--line);
      color: #0f172a;
    }

    .sortWrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
    }

    .sortWrap label {
      font-size: 12px;
      color: #334155;
      font-weight: 700;
    }

    .sortWrap select {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      color: #0f172a;
      background: #f8fafc;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.06);
    }

    .workspace-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 12px;
      align-items: start;
    }

    .table-card {
      min-width: 0;
    }

    .inspector-card {
      position: sticky;
      top: 14px;
      min-height: 320px;
    }

    .inspector-title {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 900;
      color: #0f172a;
    }

    .inspector-meta {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #334155;
    }

    .inspector-block {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px;
      background: #f8fafc;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.45;
      min-height: 120px;
      max-height: 420px;
      overflow: auto;
    }

    .meta { font-size: 13px; color: #475569; white-space: pre-wrap; word-break: break-all; }
    .small { color:#64748b; font-size: 12px; }

    .scoreBox {
      margin-top: 10px;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #eee;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 90px;
    }

    .scoreBox.queueMode {
      display: block;
      padding: 12px;
    }

    .scoreNum {
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
      color: var(--accent);
    }

    .queueGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    .queueCell {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #ffffff;
      padding: 10px 8px;
      text-align: center;
    }

    .queueLabel {
      display: block;
      font-size: 11px;
      color: #64748b;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: 0.2px;
    }

    .queueValue {
      display: block;
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      color: #0f346e;
    }

    .bg-green { background: var(--green); border-color: #86efac; }
    .bg-blue  { background: var(--blue); border-color: #93c5fd; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #eef2f7;
      padding: 10px;
      vertical-align: top;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }

    th { text-align: left; color: #475569; font-weight: 800; }
    tbody tr:hover { background:#f8fafc; }
    tbody tr.is-selected {
      background: #eff6ff;
      box-shadow: inset 0 0 0 1px #93c5fd;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 900;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
    }

    .badge.bg-green { border-color: #86efac; }
    .badge.bg-blue  { border-color: #93c5fd; }

    .appNoCell {
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .appNoLink {
      color: #0f346e;
      text-decoration: none;
      border-bottom: 1px dotted #93c5fd;
    }

    .appNoLink:hover {
      color: #1d4ed8;
      border-bottom-color: #1d4ed8;
    }

    .contentCell {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .contentPreview {
      white-space: pre-wrap;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.45;
    }

    .markdown-content {
      line-height: 1.5;
      color: #0f172a;
      word-break: break-word;
    }

    .markdown-content p,
    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3,
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6,
    .markdown-content ul,
    .markdown-content ol,
    .markdown-content blockquote,
    .markdown-content pre {
      margin: 0 0 8px 0;
    }

    .markdown-content p:last-child,
    .markdown-content h1:last-child,
    .markdown-content h2:last-child,
    .markdown-content h3:last-child,
    .markdown-content h4:last-child,
    .markdown-content h5:last-child,
    .markdown-content h6:last-child,
    .markdown-content ul:last-child,
    .markdown-content ol:last-child,
    .markdown-content blockquote:last-child,
    .markdown-content pre:last-child {
      margin-bottom: 0;
    }

    .markdown-content h1 { font-size: 16px; font-weight: 900; }
    .markdown-content h2 { font-size: 15px; font-weight: 900; }
    .markdown-content h3 { font-size: 14px; font-weight: 800; }
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6 { font-size: 13px; font-weight: 800; }

    .markdown-content ul,
    .markdown-content ol {
      padding-left: 18px;
    }

    .markdown-content li {
      margin: 2px 0;
    }

    .markdown-content blockquote {
      border-left: 3px solid #cbd5e1;
      padding-left: 10px;
      color: #334155;
      background: #f8fafc;
      border-radius: 6px;
    }

    .markdown-content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 1px 4px;
    }

    .markdown-content pre {
      overflow: auto;
      border-radius: 10px;
      border: 1px solid #1e293b;
      background: #0f172a;
      color: #e2e8f0;
      padding: 10px;
    }

    .markdown-content pre code {
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      color: inherit;
      font-size: 12px;
    }

    .markdown-content a {
      color: #1d4ed8;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .markdown-content .markdown-empty {
      color: #64748b;
      margin: 0;
    }

    .contentPreview.expandable {
      cursor: pointer;
      position: relative;
    }

    .contentPreview.expandable:hover {
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
    }

    .toggleLabel { font-size: 12px; color: #334155; font-weight: 700; }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #e5e7eb;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      top: 3px;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      transition: 0.2s ease;
    }

    .switch input:checked + .slider { background: #111827; }
    .switch input:checked + .slider:before { transform: translateX(20px); }

    #count { margin-left: auto; }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .selectionOutput {
      margin-top: 8px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 12px;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #0f172a;
      min-height: 44px;
    }

    .selection-dock {
      position: sticky;
      bottom: 10px;
      z-index: 20;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
      margin-bottom: 14px;
    }

    .selection-dock-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .selection-dock-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .checkCell {
      width: 44px;
      text-align: center;
      white-space: nowrap;
    }

    .rowCheck,
    #checkAllPage {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .pageBtn {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: #0f172a;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      min-width: 36px;
    }

    .pageBtn.active {
      background: #0f346e;
      border-color: #0f346e;
      color: #ffffff;
    }

    .hidden {
      display: none !important;
    }

    .modalBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.48);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modalPanel {
      width: min(780px, 96vw);
      max-height: 84vh;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.28);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modalHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .modalTitle {
      font-weight: 900;
      font-size: 14px;
      color: #0f172a;
    }

    .modalClose {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: #334155;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .modalBody {
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      color: #0f172a;
      font-size: 13px;
    }

    .copyright {
      margin: 0;
      text-align: center;
      padding: 10px 0 16px;
      color: var(--muted);
      font-size: 11px;
    }

    @media (max-width: 980px) {
      .workspace-grid {
        grid-template-columns: 1fr;
      }

      .inspector-card {
        position: static;
      }

      .topbar-search {
        margin-left: 0;
        width: 100%;
      }

      .topbar-search input {
        width: 100%;
      }
    }
  </style>
  <link rel="stylesheet" href="../../suite/unified-theme.css" />
</head>
<body>
  <div class="page">

    <header class="header">
      <div class="logo">
        <svg class="logoSvg" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 4L4 16V30C4 44.6 15.4 56.8 32 60C48.6 56.8 60 44.6 60 30V16L32 4Z" fill="#0F346E"/>
          <path d="M20 18V46" stroke="white" stroke-width="6" stroke-linecap="round"/>
          <path d="M44 18L20 32L44 46" stroke="#FCB034" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="title">K-SCAN 결과</div>
        <div class="subtitle">출원발명 vs 인용발명 유사도 점수</div>
      </div>
    </header>

    <div class="topbar">
      <button id="copyLatest">최신 점수 복사</button>
      <button id="clear">이력 전체 삭제</button>
      <div class="toggle">
        <span class="toggleLabel">60점 이상만 표시</span>
        <label class="switch">
          <input type="checkbox" id="filter60" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="sortWrap">
        <label for="sortMode">정렬</label>
        <select id="sortMode">
          <option value="latest">최신 순</option>
          <option value="score">점수 높은 순</option>
        </select>
      </div>
      <div class="topbar-search">
        <label for="searchInput" class="small">Search</label>
        <input id="searchInput" type="search" placeholder="출원번호 / 키워드 검색" />
      </div>
      <div class="small" id="count"></div>
    </div>
    <div class="card">
      <div class="meta" id="latestMeta">이력이 없습니다.</div>
      <div class="scoreBox" id="latestBox">
        <div class="scoreNum" id="latestScore"></div>
      </div>
    </div>
    <div class="workspace-grid">
      <div class="card table-card">
        <div class="meta">전체 이력 (페이지당 20건)</div>
        <table>
          <thead>
            <tr>
              <th class="checkCell"><input id="checkAllPage" type="checkbox" aria-label="현재 페이지 전체 선택" /></th>
              <th style="width: 170px;">시간</th>
              <th style="width: 140px;">출원번호</th>
              <th style="width: 110px;">점수</th>
              <th>내용</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="pagination" id="pagination"></div>
      </div>
      <aside class="card inspector-card">
        <h3 class="inspector-title">선택 항목 상세 보기</h3>
        <div id="inspectorMeta" class="inspector-meta">
          <div>출원번호: -</div>
          <div>점수: -</div>
          <div>시간: -</div>
        </div>
        <div id="inspectorBody" class="inspector-block markdown-content">테이블 행을 클릭하면 상세 내용이 표시됩니다.</div>
      </aside>
    </div>
    <section class="selection-dock">
      <div class="selection-dock-head">
        <div>
          <div class="meta">선택 항목 출원번호 (구분자: <code>|</code>)</div>
          <div class="small" id="selectedCount">선택 0건 / 추출 가능 0건</div>
        </div>
        <div class="selection-dock-actions">
          <button id="extractSelected" type="button">선택 출원번호 추출</button>
          <button id="copySelectedAppNos" type="button">추출값 복사</button>
          <button id="reevaluateSelected" type="button">선택 재평가</button>
          <button id="clearSelectedRows" type="button">전체 선택 해제</button>
        </div>
      </div>
      <div class="selectionOutput" id="selectedAppNos">선택된 항목의 출원번호가 여기에 표시됩니다.</div>
    </section>
  </div>
  <div class="modalBackdrop hidden" id="contentModal">
    <div class="modalPanel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modalHead">
        <div class="modalTitle" id="modalTitle">상세 내용</div>
        <button class="modalClose" id="modalClose" type="button">닫기</button>
      </div>
      <div class="modalBody markdown-content" id="modalBody"></div>
    </div>
  </div>

  <script src="../../suite/shared-version.js"></script>
  <script src="result.js"></script>
  <footer>
    <p class="copyright">© 2026. 반도체설계심사과 심사관 손준혁. All Rights Reserved.</p>
  </footer>
</body>
</html>
